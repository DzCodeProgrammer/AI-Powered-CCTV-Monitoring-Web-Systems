<div class="dashboard-sidebar-brand px-3 py-3">
    <a href="/dashboard" class="text-decoration-none text-white d-flex align-items-center gap-2">
        <span class="brand-icon"><i class="bi bi-camera-video-fill"></i></span>
        <span class="fw-bold">{{ app_name }}</span>
    </a>
</div>

<nav class="dashboard-nav flex-grow-1 px-2">
    <div class="dashboard-nav-label">Main</div>
    <a class="dashboard-nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/dashboard">
        <i class="bi bi-grid-1x2-fill"></i> Overview
    </a>
    <a class="dashboard-nav-link {% if active_page == 'monitor' %}active{% endif %}" href="/dashboard/monitor">
        <i class="bi bi-broadcast"></i> Live Monitor
    </a>

    <div class="dashboard-nav-label">People</div>
    <a class="dashboard-nav-link {% if active_page == 'users' %}active{% endif %}" href="/dashboard/users">
        <i class="bi bi-people-fill"></i> Users
    </a>
    <a class="dashboard-nav-link {% if active_page == 'register' %}active{% endif %}" href="/dashboard/register">
        <i class="bi bi-person-plus-fill"></i> Register
    </a>
    <a class="dashboard-nav-link {% if active_page == 'unknown_faces' %}active{% endif %}" href="/dashboard/unknown-faces">
        <i class="bi bi-person-exclamation"></i> Unknown Faces
    </a>

    <div class="dashboard-nav-label">Logs</div>
    <a class="dashboard-nav-link {% if active_page == 'attendance' %}active{% endif %}" href="/dashboard/attendance">
        <i class="bi bi-calendar-check-fill"></i> Attendance
    </a>
    <a class="dashboard-nav-link {% if active_page == 'detections' %}active{% endif %}" href="/dashboard/detections">
        <i class="bi bi-eye-fill"></i> Detections
    </a>
    <a class="dashboard-nav-link {% if active_page == 'user_statistics' %}active{% endif %}" href="/dashboard/user-statistics">
        <i class="bi bi-bar-chart-fill"></i> User Stats
    </a>

    <div class="dashboard-nav-label">System</div>
    <a class="dashboard-nav-link {% if active_page == 'model_settings' %}active{% endif %}" href="/dashboard/model-settings">
        <i class="bi bi-sliders"></i> Model Settings
    </a>
</nav>

<div class="dashboard-sidebar-footer px-3 py-3 mt-auto">
    <div class="admin-name mb-2">
        <i class="bi bi-person-circle me-1"></i>{{ admin.username }}
    </div>
    <form method="post" action="/logout" class="mb-0">
        <button type="submit" class="btn btn-outline-light btn-sm w-100">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
    </form>
</div>
